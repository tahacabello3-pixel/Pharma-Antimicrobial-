<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦠 Antimicrobial Agents — Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: rgba(139,195,74,0.15);
  --border-bright: rgba(139,195,74,0.4);
  --green: #8bc34a;
  --green-dim: rgba(139,195,74,0.08);
  --green-glow: rgba(139,195,74,0.2);
  --teal: #26c6da;
  --amber: #ffca28;
  --red: #ef5350;
  --red-dim: rgba(239,83,80,0.1);
  --success: #66bb6a;
  --success-dim: rgba(102,187,106,0.1);
  --text: #e6edf3;
  --text-muted: #7d8590;
  --text-dim: #4d5566;
  --r: 10px;
  --r-lg: 16px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  line-height:1.7;
  min-height:100vh;
}

/* Subtle grid background */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(139,195,74,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(139,195,74,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* ── HEADER ── */
.site-header{
  position:sticky;top:0;z-index:100;
  background:rgba(13,17,23,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
}

.logo{
  font-family:'Crimson Pro',serif;
  font-size:1.4rem;font-weight:700;
  color:var(--green);
  white-space:nowrap;
  text-shadow:0 0 20px var(--green-glow);
  flex-shrink:0;
}
.logo span{color:var(--text-muted);font-weight:400;font-size:1rem}

.search-wrap{
  flex:1;min-width:180px;max-width:380px;
  position:relative;
}
.search-wrap input{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:8px 12px 8px 36px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--border-bright)}
.search-wrap input::placeholder{color:var(--text-dim)}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--text-muted);pointer-events:none;
}

.progress-wrap{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--text-muted);
  white-space:nowrap;
  flex-shrink:0;
}
.prog-bar{
  width:100px;height:6px;
  background:var(--surface2);
  border-radius:3px;overflow:hidden;
}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--green),var(--teal));
  border-radius:3px;
  transition:width .4s ease;
}
.prog-label{font-family:'DM Mono',monospace;color:var(--green);font-size:12px;font-weight:500}

.filter-btns{
  display:flex;gap:6px;flex-wrap:wrap;
}
.filter-btn{
  padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);
  font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.filter-btn.active{
  background:var(--green-dim);border-color:var(--green);color:var(--green);
}
.filter-btn:hover{border-color:var(--border-bright);color:var(--text)}

/* ── LAYOUT ── */
.container{
  max-width:860px;margin:0 auto;
  padding:24px 16px 80px;
  position:relative;z-index:1;
}

/* ── SECTION BLOCK ── */
.section-block{
  margin-bottom:12px;
  border-radius:var(--r-lg);
  border:1px solid var(--border);
  background:var(--surface);
  overflow:hidden;
  transition:box-shadow .3s;
}
.section-block:hover{box-shadow:0 0 0 1px var(--border-bright),0 8px 30px rgba(0,0,0,.3)}
.section-block.hidden{display:none}

.section-header{
  padding:16px 20px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
  user-select:none;
  border-bottom:1px solid transparent;
  transition:background .2s, border-color .2s;
}
.section-block.open .section-header{
  border-bottom-color:var(--border);
  background:rgba(139,195,74,0.04);
}
.section-header:hover{background:var(--green-dim)}

.sec-icon{
  width:34px;height:34px;border-radius:8px;
  background:var(--green-dim);
  border:1px solid var(--border-bright);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.sec-title-wrap{flex:1}
.sec-title{
  font-family:'Crimson Pro',serif;
  font-size:1.15rem;font-weight:700;color:var(--text);
  line-height:1.3;
}
.sec-badge{
  font-size:11px;font-family:'DM Mono',monospace;
  color:var(--text-muted);margin-top:1px;
}
.sec-chevron{
  font-size:12px;color:var(--text-dim);
  transition:transform .3s;flex-shrink:0;
}
.section-block.open .sec-chevron{transform:rotate(180deg)}

/* ── CONTENT PANEL ── */
.section-body{display:none;padding:0}
.section-block.open .section-body{display:block}

.content-panel{
  padding:20px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.015);
}

.content-panel h3{
  font-family:'Crimson Pro',serif;
  font-size:1.05rem;font-weight:700;
  color:var(--teal);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.content-panel h3::before{
  content:'';display:inline-block;
  width:3px;height:16px;border-radius:2px;
  background:var(--teal);flex-shrink:0;
}

.content-panel p{
  color:rgba(230,237,243,0.82);
  margin-bottom:8px;font-size:14.5px;
  line-height:1.75;
}
.content-panel ul,.content-panel ol{
  padding-left:20px;margin-bottom:8px;
}
.content-panel li{
  color:rgba(230,237,243,0.82);
  font-size:14.5px;margin-bottom:4px;
  line-height:1.7;
}
.content-panel strong{
  color:var(--amber);font-weight:600;
}
.content-panel em{color:var(--green);font-style:normal;font-weight:500}

.drug-tag{
  display:inline-block;
  background:rgba(38,198,218,0.1);
  border:1px solid rgba(38,198,218,0.25);
  color:var(--teal);
  border-radius:5px;padding:1px 7px;
  font-size:12.5px;font-family:'DM Mono',monospace;
  margin:1px 2px;
}
.pathway-box{
  background:rgba(139,195,74,0.05);
  border:1px solid var(--border-bright);
  border-radius:8px;padding:12px 16px;
  margin:12px 0;font-family:'DM Mono',monospace;
  font-size:13px;color:var(--green);
  line-height:2;
}

/* ── Q&A PANEL ── */
.qa-panel{padding:16px 20px 20px}

.qa-header{
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.qa-header::before{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border),transparent);
}
.qa-header span{
  background:var(--surface2);padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);
}

.q-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color .2s;
}
.q-card:hover{border-color:var(--border-bright)}

.q-head{
  padding:12px 16px;
  cursor:pointer;
  display:flex;align-items:flex-start;gap:10px;
}
.q-num{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--text-dim);flex-shrink:0;padding-top:2px;min-width:24px;
}
.q-type-badge{
  font-size:10px;font-family:'DM Mono',monospace;
  padding:2px 7px;border-radius:4px;
  flex-shrink:0;margin-top:2px;
}
.badge-mcq{background:rgba(38,198,218,0.1);border:1px solid rgba(38,198,218,0.3);color:var(--teal)}
.badge-tf{background:rgba(255,202,40,0.1);border:1px solid rgba(255,202,40,0.3);color:var(--amber)}

.q-text{
  font-size:14px;color:var(--text);line-height:1.55;flex:1;
}
.q-toggle{font-size:11px;color:var(--text-dim);flex-shrink:0;transition:transform .25s;padding-top:3px}
.q-card.open .q-toggle{transform:rotate(180deg)}

.q-body{display:none;padding:0 16px 14px;padding-top:2px}
.q-card.open .q-body{display:block}

.q-options{list-style:none;margin-bottom:10px}
.q-options li{
  padding:6px 10px;margin-bottom:4px;
  border-radius:6px;font-size:13.5px;
  display:flex;align-items:flex-start;gap:8px;
  color:rgba(230,237,243,0.75);
  border:1px solid transparent;
}
.q-options li.correct-opt{
  background:var(--success-dim);
  border-color:rgba(102,187,106,0.35);
  color:var(--success);font-weight:500;
}
.opt-letter{
  font-family:'DM Mono',monospace;font-size:12px;
  flex-shrink:0;padding-top:1px;
  width:18px;
}
.correct-opt .opt-letter{color:var(--success)}

.q-answer-line{
  font-size:12.5px;
  color:var(--text-muted);
  font-family:'DM Mono',monospace;
  padding-top:4px;
  border-top:1px solid var(--border);
}
.q-answer-line strong{color:var(--success)}

/* ── ANSWER TOGGLE BUTTONS ── */
.show-answers-btn{
  background:none;border:1px solid var(--border);
  border-radius:6px;padding:4px 10px;
  font-size:12px;color:var(--text-muted);
  font-family:'DM Sans',sans-serif;cursor:pointer;
  float:right;margin-top:-2px;
  transition:all .2s;
}
.show-answers-btn:hover{border-color:var(--green);color:var(--green)}
.show-answers-btn.revealed{border-color:var(--green);color:var(--green);background:var(--green-dim)}

/* ── PROGRESS BADGE on sections ── */
.sec-progress{
  font-size:11px;font-family:'DM Mono',monospace;
  color:var(--text-dim);background:var(--surface2);
  padding:2px 8px;border-radius:10px;border:1px solid var(--border);
  flex-shrink:0;
}

/* ── MARKS ── */
.mark-correct{background:rgba(102,187,106,0.15);border-radius:3px;padding:0 2px}
.mark-wrong{background:rgba(239,83,80,0.12);border-radius:3px;padding:0 2px}

/* ── TOC ── */
.toc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:20px;
  margin-bottom:20px;
}
.toc-title{
  font-family:'Crimson Pro',serif;
  font-size:1.1rem;font-weight:700;
  color:var(--green);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:6px;
}
.toc-item{
  display:flex;align-items:center;gap:6px;
  padding:7px 10px;border-radius:8px;
  border:1px solid var(--border);
  color:var(--text-muted);font-size:13px;
  text-decoration:none;
  transition:all .2s;cursor:pointer;
}
.toc-item:hover{border-color:var(--border-bright);color:var(--text);background:var(--green-dim)}
.toc-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ── STATS BAR ── */
.stats-bar{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;
}
.stat-card{
  flex:1;min-width:100px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 16px;
  text-align:center;
}
.stat-num{
  font-family:'Crimson Pro',serif;
  font-size:2rem;font-weight:700;
  color:var(--green);line-height:1;
}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:3px}

/* ── EXPAND ALL BTN ── */
.toolbar{
  display:flex;gap:8px;margin-bottom:16px;
  flex-wrap:wrap;align-items:center;
}
.toolbar-btn{
  padding:7px 14px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-muted);font-family:'DM Sans',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s;
}
.toolbar-btn:hover{border-color:var(--border-bright);color:var(--text);background:var(--green-dim)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted);display:none}
.empty.show{display:block}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:3px}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .site-header{gap:8px}
  .progress-wrap{display:none}
  .stat-num{font-size:1.6rem}
  .toc-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

    content:`
<h3>What Are Antimicrobial Agents?</h3>
<p>Antimicrobial agents are compounds effective in the <strong>treatment of infections AND PROPHYLAXIS</strong> because of their <strong>selective toxicity</strong> — the ability to kill or inhibit an invading microorganism without harming the cells of the host. This selective toxicity depends on the existence of <strong>biochemical differences</strong> between the parasite and host cells.</p>

<h3>Sources of Antibiotics</h3>
<p><strong>1. Natural sources</strong> — Substances produced by various species of microorganisms (Bacteria, Fungi or Actinomycetes) that suppress the growth of other microorganisms. Semi-synthetic examples: <span class="drug-tag">Penicillins</span> <span class="drug-tag">Cephalosporins</span></p>
<p><strong>2. Chemical sources</strong> — Synthetic antibacterial agents such as <span class="drug-tag">Sulphonamides</span> <span class="drug-tag">Quinolones</span></p>

<h3>Bacteriostatic vs Bactericidal</h3>
<p><strong>Bacteriostatic</strong>: Arrest the growth and replication of bacteria, limiting spread of infection while the body's immune system attacks and eliminates the pathogens. Example: <em>Sulphonamides</em></p>
<p><strong>Bactericidal</strong>: These agents kill the bacteria. Example: <em>Penicillins</em></p>

<h3>Factors Affecting Selection of an Antimicrobial Agent</h3>
<p><strong>PARASITE FACTORS:</strong></p>
<ul>
  <li>Identity of the microorganism</li>
  <li>Susceptibility of the microorganism to the antimicrobial agent</li>
</ul>
<p><strong>HOST FACTORS:</strong></p>
<ul>
  <li>Previous exposure of the patient to antibiotics</li>
  <li>Age of the patient</li>
  <li>Renal and hepatic function</li>
  <li>Site of infection</li>
  <li>Administration of other drugs</li>
  <li>Pregnancy</li>
  <li>Immunity status of the patient</li>
</ul>

<h3>Resistance to Antibiotics</h3>
<p>Resistance of bacteria to antibiotics may develop as the organism adapts genetically to changes in their environment. Resistance develops due to several mechanisms:</p>
<ul>
  <li><strong>a)</strong> Production of an enzyme that inactivates the drug — e.g. production of <strong>β-lactamases (PENICILLINASES)</strong> which cleave the β-lactam ring of penicillins and cephalosporins, or <strong>AMIDASIS</strong></li>
  <li><strong>b)</strong> Alteration of drug-sensitive site or drug binding site in bacterial ribosome — e.g. resistance of <em>Erythromycin</em></li>
  <li><strong>c)</strong> Decreased drug accumulation in bacterium (drug concentration) — e.g. resistance to <em>Tetracyclines</em></li>
  <li><strong>d)</strong> Development of alternative pathway that bypasses the reaction inhibited by antibiotics — e.g. stimulate the production of dihydropteroate synthase with low affinity for Sulphonamides</li>
</ul>

<h3>Classification of Antimicrobial Agents</h3>
<ol>
  <li>The <strong>antimetabolites</strong> — including Sulphonamides and Trimethoprim, which block folate synthesis</li>
  <li>Agents that inhibit <strong>cell wall synthesis</strong> — including Penicillins, Cephalosporins, Vancomycin and Bacitracin</li>
  <li>Agents that inhibit <strong>protein synthesis</strong> — including Chloramphenicol, Tetracyclines, Erythromycin, Clindamycin and the Aminoglycosides</li>
  <li>Agents that affect <strong>nucleic acid metabolism</strong> — such as Rifampin and Quinolones</li>
  <li>Agents that affect <strong>permeability of the cell membrane</strong> — e.g. the detergents Polymixin B and Colistimethate</li>
</ol>
`

    content:`
<h3>Overview</h3>
<p>Sulphonamides are usually used as their <strong>sodium salts</strong> which are readily soluble in water.</p>
<p><strong>Examples:</strong></p>
<ul>
  <li><span class="drug-tag">Sulphadiazine</span> <span class="drug-tag">Sulphadimidine</span> <span class="drug-tag">Sulphamethoxazole</span> — Short acting, well absorbed from GIT</li>
  <li><span class="drug-tag">Sulfametopyrazine</span> — Long acting, well absorbed from GIT</li>
  <li><span class="drug-tag">Sulphasalazine</span> — Poorly absorbed from GIT</li>
  <li><span class="drug-tag">Sulphamethoxazole</span> is often given in combination with Trimethoprim (<em>co-trimoxazole</em>)</li>
</ul>

<h3>Mechanism of Action</h3>
<p>Being <strong>structural analogues to p-aminobenzoic acid (pABA)</strong>, sulphonamides <strong>competitively inhibit dihydropteroate synthase</strong> — the bacterial enzyme responsible for incorporation of pABA into dihydropteroic acid (immediate precursor of folic acid) — thus inhibit the formation of folic acid.</p>
<p>Sulphonamides do <strong>not affect mammalian cells</strong> by this mechanism, because mammals obtain folic acid from their diet and do not need to synthesize it.</p>

<div class="pathway-box">
pABA
  ↓ ← [Sulphonamides block here] Dihydropteroate Synthase
Folate
  ↓
Dihydrofolate
  ↓ ← [Trimethoprim blocks here] Dihydrofolate Reductase
Tetrahydrofolate
  ↓
Synthesis of Thymidine & Purines → DNA
</div>

<p>They are <strong>Bacteriostatic</strong>. Their action is diminished in the presence of puss cells and tissue breakdown (which contain thymidine and purines that bacteria use to bypass the need for folic acid).</p>

<h3>Clinical Uses</h3>
<ul>
  <li>Acute urinary tract infection</li>
  <li>Respiratory infections</li>
  <li>Some sexually transmitted infections</li>
  <li>Combined with Trimethoprim (co-trimoxazole) for <strong>Pneumocystis carinii pneumonia</strong></li>
  <li>Combined with Pyrimethamine for <strong>drug-resistant malaria</strong> and for <strong>toxoplasmosis</strong></li>
  <li><span class="drug-tag">Sulphasalazine</span> (sulphapyridine-salicylate combination) — used in <strong>inflammatory bowel disease</strong> and as an anti-inflammatory drug</li>
  <li><span class="drug-tag">Silver sulphadiazine</span> — used <strong>topically for infected burns</strong></li>

function buildTOC(){
  const grid = document.getElementById('tocGrid');
  SECTIONS.forEach(s => {
    const a = document.createElement('div');
    a.className = 'toc-item';
    a.innerHTML = `<div class="toc-dot"></div>${s.icon} ${s.title}`;
    a.onclick = () => {
      const el = document.getElementById('sec-'+s.id);
      if(el){ el.scrollIntoView({behavior:'smooth',block:'start'}); openSection(s.id); }
    };
    grid.appendChild(a);
  });
}

function buildSections(){
  const area = document.getElementById('contentArea');
  SECTIONS.forEach(s => {
    const qList = QUESTIONS[s.id] || [];
    const block = document.createElement('div');
    block.className = 'section-block';
    block.id = 'sec-'+s.id;

    const mcqCount = qList.filter(q=>q.type==='MCQ').length;
    const tfCount = qList.filter(q=>q.type==='TF').length;

    block.innerHTML = `
      <div class="section-header" onclick="toggleSection('${s.id}')">
        <div class="sec-icon">${s.icon}</div>
        <div class="sec-title-wrap">
          <div class="sec-title">${s.title}</div>
          <div class="sec-badge">${s.badge}</div>
        </div>
        <div class="sec-progress">${qList.length} Qs</div>
        <span class="sec-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="content-panel">${s.content}</div>
        <div class="qa-panel">
          <div class="qa-header">
            <span>📝 ${qList.length} Questions — ${mcqCount} MCQ · ${tfCount} T/F</span>
            <button class="show-answers-btn" id="revbtn-${s.id}" onclick="toggleReveal('${s.id}')">Show Answers</button>
          </div>
          <ul class="q-options" id="qlist-${s.id}"></ul>
        </div>
      </div>
    `;
    area.appendChild(block);
    renderQuestions(s.id, qList);
  });

  updateStats();
}

function renderQuestions(secId, qList){
  const container = document.getElementById('qlist-'+secId);
  if(!container) return;
  container.innerHTML = '';

  const filter = currentFilter;
  const search = document.getElementById('searchInput').value.toLowerCase();

  qList.forEach((q,i) => {
    if(filter === 'mcq' && q.type !== 'MCQ') return;
    if(filter === 'tf' && q.type !== 'TF') return;
    if(filter === 'content') return; // hide all questions in content-only mode

    if(search && !q.q.toLowerCase().includes(search) &&
       !q.opts.some(o => o.toLowerCase().includes(search))) return;

    const cardId = `${secId}-q${i}`;
    const revealed = revealedCards.has(cardId);
    const letters = ['A','B','C','D','E','F'];

    const li = document.createElement('li');
    li.style.listStyle = 'none';

    const card = document.createElement('div');
    card.className = `q-card${revealed ? ' open' : ''}`;
    card.id = 'card-'+cardId;

    let optsHtml = '';
    q.opts.forEach((opt,oi) => {
      const letter = letters[oi];
      const isCorrect = letter === q.correct && revealed;
      optsHtml += `<li class="${isCorrect ? 'correct-opt' : ''}"><span class="opt-letter">${letter}.</span> ${opt}</li>`;
    });

    card.innerHTML = `
      <div class="q-head" onclick="toggleCard('${secId}','${i}')">
        <span class="q-num">${i+1}.</span>
        <span class="q-type-badge badge-${q.type.toLowerCase()}">${q.type}</span>
        <span class="q-text">${q.q}</span>
        <span class="q-toggle">▼</span>
      </div>
      <div class="q-body">
        <ul class="q-options">${optsHtml}</ul>
        ${revealed ? `<div class="q-answer-line">✓ Answer: <strong>${q.correct} — ${q.opts[letters.indexOf(q.correct)]}</strong></div>` : `<div class="q-answer-line" style="color:var(--text-dim);font-size:12px">Click "Show Answers" above to reveal.</div>`}
      </div>
    `;
    li.appendChild(card);
    container.appendChild(li);
  });
}

function toggleCard(secId, idx){
  const cardId = `${secId}-q${idx}`;
  const card = document.getElementById('card-'+cardId);
  if(!card) return;
  card.classList.toggle('open');
}

function toggleSection(id){
  const block = document.getElementById('sec-'+id);
  if(!block) return;
  const isOpen = block.classList.contains('open');
  if(!isOpen){
    block.classList.add('open');
    openedSections.add(id);
    document.getElementById('openedCount').textContent = openedSections.size;
    saveProgress();
  } else {
    block.classList.remove('open');
  }
  updateProgressBar();
}

function openSection(id){
  const block = document.getElementById('sec-'+id);
  if(block && !block.classList.contains('open')){
    block.classList.add('open');
    openedSections.add(id);
    document.getElementById('openedCount').textContent = openedSections.size;
    updateProgressBar();
    saveProgress();
  }
}

function toggleReveal(secId){
  const btn = document.getElementById('revbtn-'+secId);
  const qList = QUESTIONS[secId] || [];
  const cardIds = qList.map((_,i) => `${secId}-q${i}`);
  const allRevealed = cardIds.every(id => revealedCards.has(id));

  if(allRevealed){
    cardIds.forEach(id => revealedCards.delete(id));
    btn.classList.remove('revealed');
    btn.textContent = 'Show Answers';
  } else {
    cardIds.forEach(id => revealedCards.add(id));
    btn.classList.add('revealed');
    btn.textContent = 'Hide Answers';
    document.getElementById('revealedCount').textContent = revealedCards.size;
  }
  renderQuestions(secId, qList);
  // Reopen all expanded cards
  qList.forEach((_,i) => {
    const card = document.getElementById(`card-${secId}-q${i}`);
    if(card) card.classList.add('open');
  });
  saveProgress();
}

function expandAll(){
  SECTIONS.forEach(s => openSection(s.id));
}

function collapseAll(){
  SECTIONS.forEach(s => {
    const block = document.getElementById('sec-'+s.id);
    if(block) block.classList.remove('open');
  });
}

function revealAllAnswers(){
  SECTIONS.forEach(s => {
    const qList = QUESTIONS[s.id] || [];
    qList.forEach((_,i) => revealedCards.add(`${s.id}-q${i}`));
    const btn = document.getElementById('revbtn-'+s.id);
    if(btn){ btn.classList.add('revealed'); btn.textContent = 'Hide Answers'; }
    renderQuestions(s.id, qList);
    qList.forEach((_,i) => {
      const card = document.getElementById(`card-${s.id}-q${i}`);
      if(card) card.classList.add('open');
    });
  });
  document.getElementById('revealedCount').textContent = revealedCards.size;
  saveProgress();
}

function resetProgress(){
  openedSections.clear();
  revealedCards.clear();
  SECTIONS.forEach(s => {
    const block = document.getElementById('sec-'+s.id);
    if(block) block.classList.remove('open');
    const btn = document.getElementById('revbtn-'+s.id);
    if(btn){ btn.classList.remove('revealed'); btn.textContent = 'Show Answers'; }
    renderQuestions(s.id, QUESTIONS[s.id]||[]);
  });
  document.getElementById('openedCount').textContent = 0;
  document.getElementById('revealedCount').textContent = 0;
  updateProgressBar();
  localStorage.removeItem('amStudyProgress');
}

function updateProgressBar(){
  const pct = Math.round((openedSections.size / SECTIONS.length) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = pct + '%';
}

function updateStats(){
  let total = 0;
  SECTIONS.forEach(s => total += (QUESTIONS[s.id]||[]).length);
  document.getElementById('totalQ').textContent = total;
}

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', function(){
  const val = this.value.toLowerCase();
  let anyVisible = false;

  SECTIONS.forEach(s => {
    const block = document.getElementById('sec-'+s.id);
    const qList = QUESTIONS[s.id] || [];

    if(!val){
      block.classList.remove('hidden');
      renderQuestions(s.id, qList);
      anyVisible = true;
      return;
    }

    const contentMatch = s.title.toLowerCase().includes(val) || s.content.toLowerCase().includes(val);
    const qMatch = qList.some(q =>
      q.q.toLowerCase().includes(val) ||
      q.opts.some(o => o.toLowerCase().includes(val))
    );

    if(contentMatch || qMatch){
      block.classList.remove('hidden');
      anyVisible = true;
      renderQuestions(s.id, qList);
      if(qMatch && !block.classList.contains('open')) openSection(s.id);
    } else {
      block.classList.add('hidden');
    }
  });

  document.getElementById('emptyState').classList.toggle('show', !anyVisible);
});

// ── FILTER BUTTONS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    SECTIONS.forEach(s => renderQuestions(s.id, QUESTIONS[s.id]||[]));
  });
});

// ── PERSIST ──
function saveProgress(){
  try{
    localStorage.setItem('amStudyProgress', JSON.stringify({
      opened: [...openedSections],
      revealed: [...revealedCards]
    }));
  }catch(e){}
}

function loadProgress(){
  try{
    const d = JSON.parse(localStorage.getItem('amStudyProgress')||'{}');
    if(d.opened) d.opened.forEach(id => openedSections.add(id));
    if(d.revealed) d.revealed.forEach(id => revealedCards.add(id));
  }catch(e){}
}

// ── INIT ──
loadProgress();
buildTOC();
buildSections();

// Apply loaded state
openedSections.forEach(id => {
  const block = document.getElementById('sec-'+id);
  if(block) block.classList.add('open');
});
revealedCards.forEach(cardId => {
  const parts = cardId.split('-q');
  if(parts.length === 2){
    const secId = parts[0], i = parts[1];
    const card = document.getElementById('card-'+cardId);
    // Will be re-rendered correctly
  }
});
SECTIONS.forEach(s => renderQuestions(s.id, QUESTIONS[s.id]||[]));
document.getElementById('openedCount').textContent = openedSections.size;
document.getElementById('revealedCount').textContent = revealedCards.size;
updateProgressBar();
</script>
</body>
</html>
